<h1 class="text-center">Products List <span class="badge bg-info">{{products.length}}</span>
</h1>

<table class="table">
  <thead>
    <tr>
      <th>S.No</th>
      <th>Product ID</th>
      <th>Product Name</th>
      <th>Price</th>
      <th>Is Available</th>
    </tr>
      </thead>
    <tbody>
      @for (item of products; track $index) {
      <tr>
        <td>{{$index+1}}</td>
        <td>{{item.id}}</td>
        <td>{{item.name}}</td>
        <td>{{item.price}}</td>
        <td><input type="checkbox" [checked]="item.isAvailable"></td>
      </tr>
    }
    </tbody>

</table>
