<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1><i class="bi bi-list"></i> Product List</h1>
        <a routerLink="/product-create" class="btn btn-success">
            <i class="bi bi-plus"></i> Add New Product
        </a>
    </div>

    <table class="table table-striped">
    <thead>
        <tr>
            <th>S.No</th>
            <th>Product Id</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Country</th>
            <th>Category</th>
            <th>In Stock</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
    @for (item of products; track $index) {
        <tr>
            <td>{{$index + 1}}</td>
            <td>{{item.productId}}</td>
            <td>{{item.productName}}</td>
            <td>{{item.price | currency : 'INR'}}</td>
            <td>{{item.country | uppercase}}</td>
             <td>{{item.category}}</td>
            <td><input type="checkbox" [checked]="item.inStock" disabled></td>
            
            <td>
                <button routerLink="/product-add/{{item.productId}}"  class="btn btn-primary">
                   <i class="bi bi-pencil"></i> Edit 
                </button>
                &nbsp;
                <button routerLink="/product-delete/{{item.productId}}" class = "btn btn-danger">
                   <i class="bi bi-trash"></i> Delete
                </button>
            </td>
        </tr>
    }
    </tbody>
    </table>
</div>
