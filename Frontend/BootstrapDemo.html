<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <button class="btn btn-success">This is Success Button</button> 
    <button class="btn btn-danger">This is Danger Button</button>
    <button class="btn btn-warning">This is Warning Button</button>
    <button class="btn btn-info">This is Info Button</button>

    </tr>

    </tr>
    <tr>

    </tr>
</table>
