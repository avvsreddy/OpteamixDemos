<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* ==============================
   1. Universal Selector
================================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    color: #333;
}
img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid #3498db;
}
h1 {
    color: #2c3e50;
    margin-top: 15px;
    font-size: 2rem;
}
p {
    line-height: 1.6;
}
a {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    background-color: #3498db;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
}
a:hover {
    background-color: #21618c;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.student-card {
    width: 450px;
    background-color: white;
    padding: 20px;
    border: 2px solid #ddd;
    border-radius: 10px;
    text-align: center;

    /* Box Model Demonstration */
    margin: 20px;

    /* Shadow */
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);

    /* Position Example */
    position: relative;
}

.course {
    color: #3498db;
    font-weight: bold;
    margin: 10px 0;
}

.skills {
    list-style-type: square;
    text-align: left;
    margin: 10px 40px 10px 20px;
}

.skills li {
    padding: 5px;
}


    </style>
</head>
<body>

<div class="container">
  <div class="student-card">
     <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTNmFBL6ekyhXFl5f5IcDMYjGf0yeAWA1Y4x7wlqFgoBWT3mAbEqFdCjk0&s" alt="Student Photo">
    <h1>Rahul Sharma</h1>
    <p class="course">Full Stack .Net Developer</p>
    <p style="font-style: italic;">Passionate about creating innovative web applications</p>
     <h3>Skills</h3>

    <ul class="skills">
        <li>Proficient in C#, ASP.NET, and JavaScript</li>
        <li>Experience with SQL Server and Entity Framework</li>
        <li>Strong problem-solving skills and attention to detail</li>
    </ul>
    <a href="https://www.linkedin.com/in/rahul-sharma" target="_blank">LinkedIn Profile</a>
</body>
</html>
