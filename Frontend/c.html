<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        h1 {
            color: red;
            text-align: center;
            border: 1px solid black;
            border-radius: 20px;
            padding: 10px;
            background-color: lightgray;
            font-family: Arial, sans-serif;
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        h2 {
            color: green;
            border: 2px dashed black;
            padding: 10px;
            margin-bottom: 20px;
        }
        h3 {
            color: blue;
            border: 2px solid black;
            padding: 10px;
         
        }
    </style>
</head>
<body>
    <h1 style="border: 2px solid blue;">Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
</body>
</html>
